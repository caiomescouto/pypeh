    value: Saliva/sputum
  - key: SEM
    value: Semen
  - key: EBC
    value: exhaled breath condensate
  - key: RBC
    value: red blood cells
  - key: BM
    value: Breast milk
  - key: ADI
    value: Adipose Tissue/Fat
  - key: H
    value: Hair
  - key: DW
    value: dermal wipes
  - key: AF
    value: Amniotic Fluid
  - key: PLT
    value: placenta tissue
  value_metadata:
  - field: id_line
    value: '2'
  - field: cb_source
    value: basic
  - field: prefix
    value: u
  - field: Varname
    value: matrix
  - field: Type
    value: categorical
  - field: Description
    value: matrix of the sample
  - field: AllowedValues
    value: 'BWB = Blood-whole blood;




      BP = Blood -plasma;




      BS = Blood -serum;




      CBWB = Cord blood-whole blood;




      CBP = Cord blood-plasma;




      CBS = Cord blood-serum;




      US = Urine- random spot;




      UD = Urine-24h;




      UM = Urine-first morning urine;




      SA = Saliva/sputum;




      SEM = Semen;




      EBC = exhaled breath condensate;




